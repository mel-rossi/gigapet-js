<!DOCTYPE html>

<html>
  <head>
    <title>Your Giga Pet</title>

    <meta name="description" content="A cool thing made with Glitch">
    <link id="favicon" rel="icon" href="https://glitch.com/edit/favicon-app.ico" type="image/x-icon">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <script src="https://code.jquery.com/jquery-2.2.1.min.js"
            integrity="sha256-gvQgAFzTH6trSrAWoH1iPo9Xc96QxSZ3feW6kem+O00="
            crossorigin="anonymous"></script>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <header>
      <h1>GigaPet JavaScript Edition</h1>
    </header>

    <main class="pet-menu">

      <section class="pet-image-container">
         <!-- Replace pet image with your own pet image -->
        <img class="pet-image" src="images/hound.jpg">
      </section>

      <section class="dashboard">
        <h2>
          <strong><span class="name">Name</span></strong>
        </h2>

        <div>
          Weight: <strong><span class="weight"></span> / 10</strong>
          <div class="meter-bar"><div class="meter-fill weight-fill"></div></div>
        </div>

        <div>
          Happiness: <strong><span class="happiness"></span> / 10</strong>
          <div class="meter-bar"><div class="meter-fill happiness-fill"></div></div>
        </div>

        <div>
          Style: <strong><span class="style"></span> / 10</strong>
          <div class="meter-bar"><div class="meter-fill style-fill"></div></div>
        </div>

        <!-- Visual notification -->
        <div class="notification"></div>

        <div class="button-container">

          <button class="treat-button">Treat</button>

          <button class="play-button">Play</button>

          <button class="exercise-button">Exercise</button>

          <button class="drip-button">Drip</button>

        </div>
      </section>

    </main>

    
  </body>

</html>
